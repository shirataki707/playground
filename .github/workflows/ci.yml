name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK Platform 36
        run: echo "y" | sdkmanager "platforms;android-36"
      - run: ./gradlew detekt

  ktlint:
    name: ktlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK Platform 36
        run: echo "y" | sdkmanager "platforms;android-36"
      - run: ./gradlew ktlintCheck

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK Platform 36
        run: echo "y" | sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew lintDebug

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK Platform 36
        run: echo "y" | sdkmanager "platforms;android-36"
      - run: ./gradlew testDebugUnitTest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK Platform 36
        run: echo "y" | sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - run: ./gradlew :app:assembleDebug
